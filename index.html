  body {
    background-color: #f5f5f5;
    color: #1a1a1a;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  h1 {
    font-size: 2.5em;
    margin-bottom: 40px;
    letter-spacing: 1px;
    font-weight: 500;
  }

  #countdown {
    display: flex;
    gap: 20px;
    font-size: 3em;
    font-weight: bold;
    margin-bottom: 40px;
  }

  .time-box {
    background-color: #ffffff;
    padding: 20px 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
    min-width: 90px;
  }

  .time-box span {
    display: block;
    font-size: 0.5em;
    color: #555;
    margin-top: 5px;
  }

  #quote {
    font-size: 1.5em;
    font-style: italic;
    color: #333;
    text-align: center;
    max-width: 600px;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }

  #quote.show {
    opacity: 1;
  }

<h1>Zile până la BAC 💀</h1>
<div id="countdown">
  <div class="time-box"><div id="days">0</div><span>Zile</span></div>
  <div class="time-box"><div id="hours">0</div><span>Ore</span></div>
  <div class="time-box"><div id="minutes">0</div><span>Minute</span></div>
  <div class="time-box"><div id="seconds">0</div><span>Secunde</span></div>
</div>

<div id="quote"></div>

<script>
  // Countdown logic
  const targetDate = new Date("June 29, 2026 09:00:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance < 0) {
      document.getElementById("countdown").textContent = "Evaluarea a început!";
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

  const quoteEl = document.getElementById("quote");

  function showRandomQuote() {
    quoteEl.classList.remove("show");

      quoteEl.textContent = randomQuote;
      quoteEl.classList.add("show");
